<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emily B - Real Estate Advisor</title>
</head>
<body style="margin: 0; padding: 0;">
  <script>
    document.documentElement.setAttribute('data-emily-loading', 'true')

    const style = document.createElement('style')
    style.id = 'emily-preload-hide'
    style.textContent = 'html[data-emily-loading="true"] body, html[data-emily-loading="true"] body * { visibility: hidden !important; }'
    document.head.appendChild(style)

    window.setTimeout(() => {
      document.documentElement.removeAttribute('data-emily-loading')
      document.getElementById('emily-preload-hide')?.remove()
    }, 7000)
  </script>

  <main id="emily-realestate"></main>
  <script type="module">
    import './main.tsx'
  </script>
</body>
</html>
